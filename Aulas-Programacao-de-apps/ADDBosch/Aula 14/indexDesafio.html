<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <script src="Chart.js"></script>
    <style>
        /* Ajuste para que os gráficos não fiquem um em cima do outro */
        .container {
            display: flex;
            flex-direction: column;
            gap: 50px;
            width: 600px;
            margin: 0 auto;
        }
        canvas {
            max-width: 100%;
            height: auto !important;
        }
    </style>
</head>
<body>

<div class="container">
    <canvas id="myBar"></canvas>
    <canvas id="myPie"></canvas>
    <canvas id="myBar2"></canvas>
    <canvas id="myPie2"></canvas>
    <canvas id="myBar3"></canvas>
    <canvas id="myPie3"></canvas>
    <canvas id="myBar4"></canvas>
</div>

<script>
    const dados = [
        { id: 1, produto: "Notebook", categoria: "Eletrônicos", preco: 3500, quantidade: 2, cliente: "Ana", cidade: "Curitiba", data: "2025-01-10" },
        { id: 2, produto: "Celular", categoria: "Eletrônicos", preco: 2000, quantidade: 1, cliente: "Carlos", cidade: "São Paulo", data: "2025-01-12" },
        { id: 3, produto: "Camiseta", categoria: "Roupas", preco: 80, quantidade: 3, cliente: "João", cidade: "Curitiba", data: "2025-01-15" },
        { id: 4, produto: "Calça", categoria: "Roupas", preco: 120, quantidade: 2, cliente: "Maria", cidade: "Rio de Janeiro", data: "2025-01-20" },
        { id: 5, produto: "Tênis", categoria: "Calçados", preco: 300, quantidade: 1, cliente: "Ana", cidade: "Curitiba", data: "2025-02-01" },
        { id: 6, produto: "Fone", categoria: "Eletrônicos", preco: 150, quantidade: 4, cliente: "Pedro", cidade: "Belo Horizonte", data: "2025-02-03" },
        { id: 7, produto: "Relógio", categoria: "Acessórios", preco: 500, quantidade: 1, cliente: "Lucas", cidade: "São Paulo", data: "2025-02-10" },
        { id: 8, produto: "Mochila", categoria: "Acessórios", preco: 200, quantidade: 2, cliente: "Fernanda", cidade: "Curitiba", data: "2025-02-15" },
        { id: 9, produto: "Tablet", categoria: "Eletrônicos", preco: 1800, quantidade: 1, cliente: "Carlos", cidade: "São Paulo", data: "2025-02-18" },
        { id: 10, produto: "Jaqueta", categoria: "Roupas", preco: 250, quantidade: 1, cliente: "Ana", cidade: "Curitiba", data: "2025-03-01" },
        { id: 11, produto: "Sandália", categoria: "Calçados", preco: 120, quantidade: 2, cliente: "Juliana", cidade: "Salvador", data: "2025-03-03" },
        { id: 12, produto: "Boné", categoria: "Acessórios", preco: 70, quantidade: 3, cliente: "Pedro", cidade: "Belo Horizonte", data: "2025-03-05" },
        { id: 13, produto: "Monitor", categoria: "Eletrônicos", preco: 900, quantidade: 1, cliente: "Lucas", cidade: "São Paulo", data: "2025-03-10" },
        { id: 14, produto: "Teclado", categoria: "Eletrônicos", preco: 250, quantidade: 2, cliente: "Fernanda", cidade: "Curitiba", data: "2025-03-12" },
        { id: 15, produto: "Mouse", categoria: "Eletrônicos", preco: 100, quantidade: 3, cliente: "João", cidade: "Curitiba", data: "2025-03-15" }
    ];

    // Faturamento por Categoria
    const resumoCategoria = dados.reduce((acc, item) => {
        const totalItem = item.preco * item.quantidade;
        if (!acc[item.categoria]) { acc[item.categoria] = 0; }
        acc[item.categoria] += totalItem;
        return acc;
    }, {});

    // Quantidade por Categoria
    const resumoQuantidade = dados.reduce((acc, item) => {
        if (!acc[item.categoria]) { acc[item.categoria] = 0; }
        acc[item.categoria] += item.quantidade;
        return acc;
    }, {});

    // Faturamento por Cidade
    const resumoCidade = dados.reduce((acc, item) => {
        const totalItem = item.preco * item.quantidade;
        if (!acc[item.cidade]) { acc[item.cidade] = 0; }
        acc[item.cidade] += totalItem;
        return acc;
    }, {});

    // Quantidade por Cidade
    const resumoQuantidadeCidade = dados.reduce((acc, item) => {
        if (!acc[item.cidade]) { acc[item.cidade] = 0; }
        acc[item.cidade] += item.quantidade;
        return acc;
    }, {});

    // Faturamento por Cliente
    const resumoCliente = dados.reduce((acc, item) => {
        const totalItem = item.preco * item.quantidade;
        if (!acc[item.cliente]) { acc[item.cliente] = 0; }
        acc[item.cliente] += totalItem;
        return acc;
    }, {});

    // Quantidade por Cliente
    const resumoQuantidadeClientes = dados.reduce((acc, item) => {
        if (!acc[item.cliente]) { acc[item.cliente] = 0; }
        acc[item.cliente] += item.quantidade;
        return acc;
    }, {});
    
    // Quantidade por Produto
    const resumoVendasProduto = dados.reduce((acc, item) => {
        if (!acc[item.produto]) { acc[item.produto] = 0; }
        acc[item.produto] += item.quantidade;
        return acc;
    }, {});


    // Gráficos Gerados:
    // Faturamento por categoria
    const ctxBar = document.getElementById('myBar');
    new Chart(ctxBar, {
        type: 'bar',
        data: {
            labels: Object.keys(resumoCategoria),
            datasets: [{
                label: 'Faturamento por Categoria (R$)',
                data: Object.values(resumoCategoria),
                backgroundColor: 'rgba(54, 162, 235, 0.5)',
                borderWidth: 1
            }]
        }
    });

    // Quantidade total por categoria
    const ctxPie = document.getElementById('myPie');
    new Chart(ctxPie, {
        type: 'pie',
        data: {
            labels: Object.keys(resumoQuantidade),
            datasets: [{
                label: 'Quantidade Total',
                data: Object.values(resumoQuantidade),
                backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff'],
                borderWidth: 1
            }]
        }
    });

    //  Faturamento por cidade
    const ctxBar2 = document.getElementById('myBar2');
    new Chart(ctxBar2, {
        type: 'bar',
        data: {
            labels: Object.keys(resumoCidade),
            datasets: [{
                label: 'Faturamento por Cidade (R$)',
                data: Object.values(resumoCidade),
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderWidth: 1
            }]
        }
    });

    // Número de pedidos por cidade
    const ctxPie2 = document.getElementById('myPie2');
    new Chart(ctxPie2, {
        type: 'pie',
        data: {
            labels: Object.keys(resumoQuantidadeCidade),
            datasets: [{
                label: 'Quantidade Total',
                data: Object.values(resumoQuantidadeCidade),
                backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff'],
                borderWidth: 1
            }]
        }
    });

    // Total gasto por cliente
    const ctxBar3 = document.getElementById('myBar3');
    new Chart(ctxBar3, {
        type: 'bar',
        data: {
            labels: Object.keys(resumoCliente),
            datasets: [{
                label: 'Faturamento por Cliente (R$)',
                data: Object.values(resumoCliente),
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderWidth: 1
            }]
        }
    });

    // Distribuição de clientes
    const ctxPie3 = document.getElementById('myPie3');
    new Chart(ctxPie3, {
        type: 'pie',
        data: {
            labels: Object.keys(resumoQuantidadeClientes),
            datasets: [{
                label: 'Produtos Totais:',
                data: Object.values(resumoQuantidadeClientes),
                backgroundColor: ['#ff6384', '#36a2eb', '#ffce56', '#4bc0c0', '#9966ff'],
                borderWidth: 1
            }]
        }
    });
    
    // Quantidade por Produto
    const ctxBar4 = document.getElementById('myBar4');
    new Chart(ctxBar4, {
        type: 'bar',
        data: {
            labels: Object.keys(resumoVendasProduto),
            datasets: [{
                label: 'Quantidade Vendida: ',
                data: Object.values(resumoVendasProduto),
                backgroundColor: 'rgba(75, 192, 192, 0.5)',
                borderWidth: 1
            }]
        }
    });
  

</script>

</body>
</html>
